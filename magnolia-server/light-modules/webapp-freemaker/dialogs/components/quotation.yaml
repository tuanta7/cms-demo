label: quotation
form:
  properties:
    container:
      $type: switchableField
      label: Container
      field:
        $type: comboBoxField
        defaultValue: columns
        required: true
        datasource:
          $type: optionListDatasource
          options:
            - name: columns
              label: Columns
              value: columns
            - name: rows
              label: Rows
              value: rows
      itemProvider:
        $type: jcrChildNodeProvider
      forms:
        - name: columns
          properties:
            count:
              $type: radioButtonGroupField
              layout: horizontal
              label: Number of columns
              defaultValue: 3
              required: true
              datasource:
                $type: optionListDatasource
                options:
                  - name: one
                    label: 1
                    value: 1
                  - name: two
                    label: 2
                    value: 2
                  - name: three
                    label: 3
                    value: 3
                  - name: four
                    label: 4
                    value: 4
                  - name: five
                    label: 5
                    value: 5
        - name: rows
          properties:
            count:
              $type: radioButtonGroupField
              layout: horizontal
              label: Number of rows
              defaultValue: 3
              required: true
              datasource:
                $type: optionListDatasource
                options:
                  - name: one
                    label: 1
                    value: 1
                  - name: two
                    label: 2
                    value: 2
                  - name: three
                    label: 3
                    value: 3
                  - name: four
                    label: 4
                    value: 4
                  - name: five
                    label: 5
                    value: 5