label: plan
form:
  properties:
    title:
      $type: textField
      label: Title
      required: true
      i18n: true
    description:
      $type: richTextField
      i18n: true
      colors: 02373F
      fontSizes: 'Small/0.75rem;Default/1rem;Big/1.5rem'
      label: Description
    imageChooser:
      $type: switchableField
      label: Image
      i18n: true
      field:
        $type: comboBoxField
        emptySelectionAllowed: true
        datasource:
          $type: optionListDatasource
          options:
            - name: image
              label: Internal Image
              value: image
            - name: externalImage
              label: External Image
              value: externalImage
      itemProvider:
        $type: jcrChildNodeProvider
      forms:
        - name: image
          properties:
            imagePosition:
              $type: comboBoxField
              label: Image Position
              defaultValue: top
              required: true
              datasource:
                $type: optionListDatasource
                options:
                  - name: top
                    label: Top
                    value: top
                  - name: left
                    label: Left
                    value: left
                  - name: right
                    label: Right
                    value: right
            image:
              i18n: true
              required: true
              $type: damLinkField
              label: Internal Image Link
            imageAlt:
              i18n: true
              $type: textField
              label: Image Alt Text
        - name: externalImage
          properties:
            imagePosition:
              $type: comboBoxField
              label: Image Position
              defaultValue: top
              required: true
              datasource:
                $type: optionListDatasource
                options:
                  - name: top
                    label: Top
                    value: top
                  - name: left
                    label: Left
                    value: left
                  - name: right
                    label: Right
                    value: right
            externalImage:
              i18n: true
              required: true
              $type: textField
              label: External Image Link
              validators:
                imageUrlValidator:
                  $type: regexpValidator
                  pattern: ^https?:\/\/(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?:\/[^\s]*)?$
                  errorMessage: Enter a valid Image URL
            externalImageAlt:
              i18n: true
              $type: textField
              label: Image Alt Text
    linkChooser:
      $type: switchableField
      label: Button / Link
      i18n: true
      field:
        $type: comboBoxField
        datasource:
          $type: optionListDatasource
          options:
            - name: internalLink
              label: Internal Page
              value: internalLink
            - name: externalLink
              label: External URL
              value: externalLink
      itemProvider:
        $type: jcrChildNodeProvider
      forms:
        - name: internalLink
          properties:
            internalLink:
              i18n: true
              $type: pageLinkField
              label: Internal Page
              required: true
              converterClass: info.magnolia.ui.editor.converter.JcrNodeToPathConverter
            linkText:
              i18n: true
              $type: textField
              label: Button Text
              required: true
        - name: externalLink
          properties:
            externalLink:
              i18n: true
              $type: textField
              label: External URL
              required: true
              validators:
                urlValidator:
                  $type: regexpValidator
                  pattern: ^https?:\/\/(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?:\/[^\s]*)?$
                  errorMessage: Enter a valid URL
            linkText:
              i18n: true
              $type: textField
              label: Button Text
              required: true