name: manutd

domains:
  - name: localhost

templates:
  availability:
    templates:
      home:
        id: manutd-lm:pages/home
      players:
        id: manutd-lm:pages/players

mappings:
  manutd:
    URIPrefix: "/"
    handlePrefix: "/manutd"
    repository: website

cors:
  manutd:
    allowedMethods:
      GET: GET

i18n:
  class: info.magnolia.cms.i18n.DefaultI18nContentSupport
  enabled: true
  fallbackLocale: en
