class: info.magnolia.rest.delivery.jcr.v2.JcrDeliveryEndpointDefinition
workspace: website
rootPath: /
depth: 20
limit: 100
referenceDepth: 3
bypassWorkspaceAcls: true
personalized: true

systemProperties:
  - mgnl:template
  # - mgnl:createdBy

nodeTypes:
  - mgnl:page
childNodeTypes:
  - mgnl:area
  - mgnl:component
  - mgnl:contentNode

references:
  - name: footerReference
    propertyName: footer
    referenceResolver:
      $type: jcrReferenceResolver
      targetWorkspace: footers
