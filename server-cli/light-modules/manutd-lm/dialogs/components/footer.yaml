label: Footer
form:
  properties:
    description:
      label: Description
      $type: staticField
      value: Add Footer into the content page
    footer:
      label: Footer
      $type: pageLinkField
      i18n: false
      placeholder: Select a footer
      textInputAllowed: false
      required: true
      chooser:
        datasource:
          $type: jcrDatasource
          workspace: footers
        workbenchChooser:
          appName: footers-app
        textInputAllowed: false
        converterClass: info.magnolia.ui.editor.converter.JcrNodeToPathConverter # For easier manual fetch
