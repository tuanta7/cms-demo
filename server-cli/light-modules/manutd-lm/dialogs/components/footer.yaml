label: Footer
form:
  properties:
    description:
      label: Description
      $type: staticField
      value: Add Footer into the content page
    footer:
      label: Footer
      $type: linkField
      i18n: false
      placeholder: Select a footer
      textInputAllowed: false
      required: true
      datasource:
        $type: jcrDatasource
        workspace: footers
      chooser:
        workbenchChooser:
          appName: footers-app
      converterClass: info.magnolia.ui.editor.converter.JcrNodeToPathConverter # For easier manual fetch
